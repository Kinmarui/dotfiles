# manifest.conf — apps bootstrap.sh installs by default (one per line).
# Each name maps to install/<name>.sh (or the private overlay's install/<name>.sh).
# Lines after '#' are comments. Override on the CLI: ./bootstrap.sh zellij mosh
#
# A private overlay's manifest.conf (if present) is appended to this one.

# --- terminal CLI tools (adapted from omakub) ---
terminal-tools     # fzf ripgrep bat eza zoxide fd plocate jq unzip zip ncdu
mise               # runtime version manager (node, python, ...)
github-cli         # gh
delta              # git-delta diff pager (wires into git config)
lazygit
lazydocker
neovim
btop
fastfetch

# --- our additions ---
zellij             # pinned binary + custom config/layouts/zjstatus
claude             # Claude Code (native installer)
mosh               # roaming SSH (opens UDP 60000-61000)

# --- opt-in (uncomment to enable) ---
# docker           # docker-ce engine + compose; adds you to the docker group
# libraries        # build-essential + dev headers (heavy)
# git-aliases      # global git aliases (co/br/ci/st, pull.rebase)
